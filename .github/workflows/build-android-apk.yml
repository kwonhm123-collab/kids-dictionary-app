name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-android-apk.yml"
      - "android-webview-shell/**"
      - "outputs/kids-dictionary-release/**"

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Sync dictionary fallback assets
        working-directory: android-webview-shell
        run: |
          rm -rf app/src/main/assets/www
          mkdir -p app/src/main/assets/www
          cp -R ../outputs/kids-dictionary-release/. app/src/main/assets/www/

      - name: Build debug APK
        working-directory: android-webview-shell
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: uniuni-dictionary-debug-apk
          path: android-webview-shell/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
